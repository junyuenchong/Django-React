name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Backend lint/type checks (mypy/ruff)
        env:
          PYTHONPATH: backend
        run: |
          cd backend
          mypy apps config
          ruff check .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Frontend typecheck (tsc)
        run: |
          cd frontend
          npm run typecheck

      - name: Run unit tests
        env:
          PYTHONPATH: backend
        run: |
          cd backend
          pytest -m unit

      - name: Run integration tests
        env:
          PYTHONPATH: backend
        run: |
          cd backend
          pytest -m integration

